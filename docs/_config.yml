title: InfraGuard
description: Red team C2, phishing, and payload delivery infrastructure redirector
remote_theme: just-the-docs/just-the-docs@v0.10.0

url: "https://whispergate.github.io"
baseurl: ""

favicon_ico: "/assets/images/infraguard_icon.svg"

color_scheme: dark
search_enabled: true
heading_anchors: true
permalink: pretty

aux_links:
  "GitHub":
    - "https://github.com/Whispergate/InfraGuard"
aux_links_new_tab: true

nav_sort: order

callouts_level: quiet
callouts:
  warning:
    title: Warning
    color: yellow
  danger:
    title: Danger
    color: red
  note:
    title: Note
    color: blue

footer_content: "InfraGuard &mdash; Authorized use only. For approved red team engagements."

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
