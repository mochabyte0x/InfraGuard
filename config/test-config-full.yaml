# ═══════════════════════════════════════════════════════════════════════
# InfraGuard Full Configuration Reference
# ═══════════════════════════════════════════════════════════════════════
#
# Demonstrates every feature: multi-protocol listeners, 7 C2 frameworks,
# content delivery routes, SIEM/webhook plugins, threat intel feeds,
# GeoIP, rule ingestion, JA3 TLS fingerprinting, burn detection,
# one-time payload tokens, phishing campaign tokens, and OPSEC options.
#
# Environment variables (${VAR}) are resolved from .env automatically.
# Docs: https://github.com/Whispergate/InfraGuard

# ── Listeners ─────────────────────────────────────────────────────────
# Each listener binds a port for one protocol. Multiple listeners run
# simultaneously, sharing IP intelligence, event tracking, and plugins.
# TLS certs are auto-generated (self-signed) if the configured paths
# don't exist.

listeners:
  # HTTPS listener for HTTP-based C2 traffic (CS, Mythic, BRC4, Sliver, Havoc)
  - protocol: "https"
    bind: "0.0.0.0"
    port: 443
    tls:
      cert: "${INFRAGUARD_TLS_CERT}"
      key: "${INFRAGUARD_TLS_KEY}"
    domains:
      - "cdn.example.com"
      - "static.example.net"
      - "api.example.com"
      - "assets.example.com"
      - "portal.example.com"

  # HTTP listener (no TLS - for redirects, staging, or port 80 cover)
  - protocol: "http"
    bind: "0.0.0.0"
    port: 80
    domains:
      - "cdn.example.com"

  # DNS listener for DNS-based C2 (Cobalt Strike DNS, Mythic DNS)
  # Requires: pip install infraguard[dns-listener]
  # - protocol: "dns"
  #   bind: "0.0.0.0"
  #   port: 53
  #   domains:
  #     - "dns.example.com"
  #   options:
  #     upstream: "8.8.8.8:53"              # forward allowed queries here
  #     allowed_types: ["A", "AAAA", "TXT"] # block other query types

  # MQTT listener for MQTT-based C2 channels
  # Requires: pip install infraguard[mqtt-listener]
  # - protocol: "mqtt"
  #   bind: "0.0.0.0"
  #   port: 1883
  #   options:
  #     upstream: "mqtt://10.0.0.5:1883"    # upstream MQTT broker
  #     allowed_topics: ["sensors/#", "data/#"]

  # WebSocket listener for WS-based C2 (Mythic, Sliver)
  # - protocol: "wss"
  #   bind: "0.0.0.0"
  #   port: 8443
  #   tls:
  #     cert: "${INFRAGUARD_TLS_CERT}"
  #     key: "${INFRAGUARD_TLS_KEY}"
  #   domains:
  #     - "ws.example.com"
  #   options:
  #     upstream: "wss://10.0.0.5:9443"     # upstream WebSocket server
  #     path: "/ws"                          # WebSocket endpoint path

# ── Domains ───────────────────────────────────────────────────────────
# Each domain runs independently with its own C2 profile, upstream
# teamserver, IP whitelist, drop action, and content delivery routes.
#
# Supported profile types:
#
#   C2 frameworks (require profile_path):
#     cobalt_strike  - .profile files (Malleable C2 DSL)
#     mythic         - .json files (Mythic HTTPX profile format)
#     brute_ratel    - .json files (BRC4 server config with listeners)
#     sliver         - .json files (Sliver HTTP C2 profile with URI generation)
#     havoc          - .toml files (Havoc/Kaine profile with URI alternation patterns)
#     nighthawk      - Nighthawk .json listener config (routes + implant metadata)
#     poshc2         - PoshC2 YAML config (GET_Requests, POST_Requests, UserAgent)
#
#   Phishing frameworks (no profile_path needed):
#     gophish        - GoPhish landing pages, tracking, and report endpoints
#     evilginx       - Evilginx reverse proxy phishlets (proxies all paths)
#     cuddlephish    - CuddlePhish OAuth/device-code phishing flows
#     passthrough    - Generic proxy mode - all paths forwarded, no profile matching

domains:

  # ── Cobalt Strike domain ────────────────────────────────────────────
  # Fronts a CS teamserver behind a jQuery CDN lookalike.
  # Malleable profile defines URIs, headers, transforms, and metadata.
  cdn.example.com:
    upstream: "${INFRAGUARD_CS_UPSTREAM}"
    profile_path: "examples/jquery-c2.3.14.profile"
    profile_type: "cobalt_strike"
    whitelist_cidrs:
      - "192.168.1.0/24"       # operator subnet
      - "10.0.0.0/8"           # internal range
    decoy_dir: null             # path to static site served to blocked visitors
    drop_action:
      type: "redirect"          # redirect | reset | proxy | tarpit
      target: "https://jquery.com"

    # ── Content delivery routes (optional) ──────────────────────────
    # Evaluated BEFORE the C2 profile filter. Serve payloads, decoys,
    # or static files at specific paths without affecting beacon traffic.
    # content_routes:
    #
    #   # ── Mythic file staging ──────────────────────────────────────
    #   # Serves a Mythic-hosted payload at a clean URL. Mythic's
    #   # /direct/download/{uuid} is unauthenticated — all access control
    #   # is enforced by InfraGuard's filter pipeline + guard below.
    #   #
    #   # Guard stack (all checks AND-ed, must ALL pass):
    #   #   1. require_beacon_ip  → only IPs that already completed N C2
    #   #      checkins (dynamically whitelisted) can fetch the payload.
    #   #   2. allowed_user_agents → Windows HTTP client UA required.
    #   #   3. required_headers   → implant-specific header must match.
    #   #   4. forbidden_headers  → no Via/X-Forwarded-For (proxy/scanner).
    #   #   5. require_token      → one-time token issued at beacon whitelist.
    #   #   6. rate_limit         → single download per IP per hour.
    #   - path: "/jquery-3.7.1.min.js"
    #     backend:
    #       type: "mythic_file"
    #       target: "https://${MYTHIC_IP}:7443"    # Mythic teamserver URL
    #       file_id: "${MYTHIC_STAGE2_FILE_ID}"    # UUID from Mythic file store
    #       ssl_verify: false                      # Mythic uses self-signed cert
    #       # Override filename in browser/implant download prompt:
    #       headers:
    #         Content-Disposition: "attachment; filename=\"update.bin\""
    #     guard:
    #       require_beacon_ip: true                # must be a known C2 beacon
    #       allowed_user_agents:
    #         - "^Mozilla/5\\.0 \\(Windows NT"     # Windows browser UA
    #         - "WinHTTP"                          # Windows HTTP client
    #       required_headers:
    #         X-Requested-With: "XMLHttpRequest"   # implant-injected header
    #       forbidden_headers:
    #         - "Via"                              # proxy traversal
    #         - "X-Forwarded-For"                 # CDN / scanner proxy
    #         - "CF-Worker"                        # Cloudflare Worker
    #     require_token: true
    #     rate_limit:
    #       enabled: true
    #       max_downloads: 1
    #       window_seconds: 3600
    #     conditional:
    #       score_threshold: 0.5
    #       scanner_backend:
    #         type: "http_proxy"
    #         target: "https://jquery.com/jquery-3.7.1.min.js"
    #     track: true
    #
    #   # ── Mythic proxy mode ────────────────────────────────────────
    #   # Expose all of Mythic's download space behind InfraGuard.
    #   # UUID is extracted from the incoming path; no file_id in config.
    #   # Use require_beacon_ip so only known beacons can enumerate files.
    #   - path: "/dl/*"
    #     backend:
    #       type: "mythic_file"
    #       target: "https://${MYTHIC_IP}:7443"
    #       ssl_verify: false
    #     guard:
    #       require_beacon_ip: true
    #       forbidden_headers: ["Via", "X-Forwarded-For"]
    #     rate_limit:
    #       enabled: true
    #       max_downloads: 5
    #       window_seconds: 300
    #     track: true
    #
    #   # ── PwnDrop payload delivery ─────────────────────────────────
    #   # Token issued automatically when a beacon is first whitelisted.
    #   # Second download of same URL from any IP → 403. Bulk harvest → 429.
    #   - path: "/downloads/*"
    #     backend:
    #       type: "pwndrop"
    #       target: "http://pwndrop:80"    # Docker internal URL
    #       auth_token: "${PWNDROP_TOKEN}"
    #     require_token: true              # gate behind one-time payload token
    #     rate_limit:
    #       enabled: true
    #       max_downloads: 2              # allow max 2 downloads per IP per window
    #       window_seconds: 300           # 5-minute sliding window
    #     conditional:
    #       score_threshold: 0.5           # bots/scanners get decoy instead
    #       scanner_backend:
    #         type: "http_proxy"
    #         target: "https://jquery.com"
    #     track: true
    #   # Static files from local directory (no token required, rate-limited)
    #   - path: "/assets/*"
    #     backend:
    #       type: "filesystem"
    #       target: "/app/decoys"
    #     rate_limit:
    #       enabled: true
    #       max_downloads: 10
    #       window_seconds: 60
    #   # Generic HTTP proxy (e.g., RedFile conditional delivery)
    #   - path: "/share/*"
    #     backend:
    #       type: "http_proxy"
    #       target: "https://redfile.internal:9090"

  # ── Mythic domain ───────────────────────────────────────────────────
  # Fronts a Mythic teamserver with the HTTPX JSON profile format.
  # Non-matching requests get proxied to a real site.
  static.example.net:
    upstream: "${INFRAGUARD_MYTHIC_UPSTREAM}"
    profile_path: "examples/mythic-httpx.json"
    profile_type: "mythic"
    whitelist_cidrs: []         # empty = all IPs allowed (no whitelist)
    drop_action:
      type: "proxy"            # serve real content from the target site
      target: "https://example.net"

  # ── Brute Ratel C4 domain ───────────────────────────────────────────
  # Fronts a BRC4 teamserver. Profile defines listeners with URIs,
  # headers, prepend/append transforms, and User-Agent.
  # api.example.com:
  #   upstream: "https://10.0.0.7:8443"
  #   profile_path: "examples/brc4-profile.json"
  #   profile_type: "brute_ratel"
  #   drop_action:
  #     type: "redirect"
  #     target: "https://aws.amazon.com/ec2/pricing/"

  # ── Sliver domain ──────────────────────────────────────────────────
  # Fronts a Sliver teamserver. Profile generates valid URI combinations
  # from path/file/extension patterns. Sliver randomizes User-Agent,
  # so UA validation is skipped (bot filter still catches scanners).
  # assets.example.com:
  #   upstream: "https://10.0.0.8:31337"
  #   profile_path: "examples/sliver.json"
  #   profile_type: "sliver"
  #   drop_action:
  #     type: "tarpit"         # slow-drip response to waste scanner time
  #     target: ""

  # ── Havoc domain ───────────────────────────────────────────────────
  # Fronts a Havoc teamserver. TOML profile defines URI patterns with
  # [a|b|c] alternation syntax that expands into all valid combinations.
  # Supports Kaine agent task-request (GET) and task-output (POST).
  # portal.example.com:
  #   upstream: "https://10.0.0.9:40056"
  #   profile_path: "examples/kaine.toml"
  #   profile_type: "havoc"
  #   drop_action:
  #     type: "proxy"
  #     target: "https://portal.azure.com"

  # ── Nighthawk domain ───────────────────────────────────────────────
  # Fronts a Nighthawk teamserver. Profile parses listener.http.routes
  # for URI/method/header matching and implant.metadata for message location.
  # nighthawk.example.com:
  #   upstream: "https://10.0.0.10:443"
  #   profile_path: "examples/nighthawk-listener.json"
  #   profile_type: "nighthawk"
  #   drop_action:
  #     type: "redirect"
  #     target: "https://cloudfront.net"

  # ── PoshC2 domain ──────────────────────────────────────────────────
  # Fronts a PoshC2 teamserver. YAML profile reads GET_Requests,
  # POST_Requests, UserAgent, DefaultSleep, and KillDate.
  # poshc2.example.com:
  #   upstream: "https://10.0.0.11:4443"
  #   profile_path: "examples/poshc2-config.yaml"
  #   profile_type: "poshc2"
  #   drop_action:
  #     type: "proxy"
  #     target: "https://example.com"

  # ── GoPhish domain ─────────────────────────────────────────────────
  # Fronts a GoPhish instance. No C2 profile needed - path-based
  # filtering allows tracking pixels (/track/*), report endpoint
  # (/report), static assets (/static/*), and landing pages.
  # IP/bot/geo filters still run to block scanners.
  #
  # campaign_token gates the page behind a per-campaign token embedded
  # in email links. Analysts who discover the URL via CT logs or threat
  # feeds cannot load it without the campaign token.
  #
  # phish.example.com:
  #   upstream: "https://10.0.0.14:3333"
  #   profile_type: "gophish"
  #   # allowed_paths:                       # optional - overrides built-in patterns
  #   #   - "/custom-landing"                # exact path
  #   #   - "/campaigns/*"                   # prefix glob
  #   #   - "~^/t/[a-f0-9]+"                # regex (prefix with ~)
  #   campaign_token:
  #     enabled: true
  #     token_param: "t"                     # ?t= in phishing email links
  #     tokens:                              # static token list (or use hmac_secret)
  #       - "${CAMPAIGN_TOKEN_Q1}"
  #       - "${CAMPAIGN_TOKEN_Q2}"
  #     # HMAC alternative - tokens are payload:timestamp:hmac_hex (7-day TTL)
  #     # hmac_secret: "${CAMPAIGN_HMAC_SECRET}"
  #     # hmac_ttl_seconds: 604800
  #     score_on_missing: 0.8               # adds to pipeline score if token absent
  #   drop_action:
  #     type: "redirect"
  #     target: "https://example.com"

  # ── Evilginx domain ────────────────────────────────────────────────
  # Fronts an Evilginx reverse proxy. Two modes:
  #
  # 1. With phishlet file (recommended): InfraGuard parses the phishlet
  #    to extract login paths and auth_urls for filtering.
  #    Set profile_path to the phishlet YAML file.
  #
  # 2. Without phishlet: all paths are forwarded (Evilginx default).
  #    Use allowed_paths to restrict if needed.
  #
  # IP/bot/geo filters protect against scanners discovering the phishlet.
  # login.example.com:
  #   upstream: "https://10.0.0.11:443"
  #   profile_type: "evilginx"
  #   profile_path: "examples/wordpress-phishlet.yaml"  # optional phishlet file
  #   # allowed_paths:                       # optional - replaces defaults
  #   #   - "/wp-login.php"
  #   #   - "/wp-admin/*"
  #   drop_action:
  #     type: "proxy"
  #     target: "https://login.microsoftonline.com"

  # ── CuddlePhish domain ─────────────────────────────────────────────
  # Fronts a CuddlePhish OAuth/device-code phishing server. All paths
  # forwarded - CuddlePhish handles OAuth flow routing internally.
  # Use allowed_paths to restrict to specific OAuth endpoints.
  # auth.example.com:
  #   upstream: "https://10.0.0.12:8443"
  #   profile_type: "cuddlephish"
  #   # allowed_paths:
  #   #   - "/devicelogin"
  #   #   - "/common/oauth2/*"
  #   #   - "/common/login"
  #   drop_action:
  #     type: "redirect"
  #     target: "https://login.microsoftonline.com"

  # ── Generic passthrough domain ──────────────────────────────────────
  # Pure reverse proxy with IP/bot/geo filtering. All requests that
  # pass the filter pipeline are forwarded to upstream. No profile
  # matching at all. Use for custom phishing frameworks, payload
  # delivery servers, or any HTTP service that needs scanner protection.
  #
  # If allowed_paths is set, only those paths are proxied (converts
  # passthrough into path-filtered mode).
  # proxy.example.com:
  #   upstream: "https://10.0.0.13:8080"
  #   profile_type: "passthrough"
  #   # allowed_paths:                       # optional - restricts passthrough
  #   #   - "/api/*"
  #   #   - "/webhook"
  #   drop_action:
  #     type: "reset"
  #     target: ""

# ── IP Intelligence ───────────────────────────────────────────────────

intel:
  # GeoIP databases (all optional, download with: docker compose --profile geoip up geoip-update)
  geoip_db: "${INFRAGUARD_GEOIP_DB}"                  # GeoLite2-City.mmdb
  geoip_asn_db: "${INFRAGUARD_GEOIP_ASN_DB}"          # GeoLite2-ASN.mmdb
  geoip_country_db: "${INFRAGUARD_GEOIP_COUNTRY_DB}"  # GeoLite2-Country.mmdb

  blocked_countries: []                  # e.g. ["CN", "RU", "KP", "IR"]
  allowed_countries: []                  # e.g. ["US", "GB", "DE"] - if set, ONLY these pass
  blocked_asns: []                       # e.g. [14061, 16276] for DigitalOcean, OVH
  allowed_asns: []                       # e.g. [15169, 13335] for Google, Cloudflare - if set, ONLY these pass
  auto_block_scanners: true              # block Shodan, Censys, Rapid7, etc.
  dynamic_whitelist_threshold: 3         # auto-whitelist after N valid C2 requests

  # Ingested blocklist from rules/ directory
  # Generate with: infraguard ingest rules/.htaccess --format blocklist -o rules/banned_ips.txt
  banned_ip_file: "${INFRAGUARD_BANNED_IP_FILE}"

  # Auto-ingest .htaccess and robots.txt from this directory on startup.
  # Drop rule files into the rules/ directory and they'll be loaded automatically.
  rules_dir: "${INFRAGUARD_RULES_DIR}"

  # DNS subdomain enumeration detection (Amass, subfinder, dnsrecon)
  # Tracks NXDOMAIN responses per client IP over a sliding window.
  # On threshold breach the source IP is immediately added to the blocklist.
  dns_enum_nxdomain_threshold: 15       # NXDOMAIN responses within window = block
  dns_enum_window_seconds: 30          # sliding window length in seconds

  # Threat intel feed auto-update
  feeds:
    enabled: true
    refresh_interval_hours: 12
    cache_dir: ".infraguard/feeds"
    urls: []                             # empty = built-in defaults (abuse.ch, ET, Spamhaus, etc.)
    # Custom feeds (plain-text IP/CIDR lists):
    # urls:
    #   - "https://example.com/custom-blocklist.txt"

  # Certificate Transparency log monitoring (crt.sh polling)
  # Fires burn alerts when new certificates are issued for monitored domains.
  # Know you're being targeted before active scanning begins.
  ct_monitor:
    enabled: false
    interval_hours: 6.0
    monitored_domains: []              # empty = auto-populate from domains keys above

  # Domain reputation self-monitoring (URLhaus, OpenPhish, Google Safe Browsing)
  # Fires burn alerts the moment a C2 or phishing domain is listed.
  reputation_monitor:
    enabled: false
    interval_hours: 4.0
    monitored_domains: []              # empty = auto-populate from domains keys above
    check_urlhaus: true
    check_openphish: true
    check_google_safebrowsing: false   # requires google_safebrowsing_api_key
    # google_safebrowsing_api_key: "${GOOGLE_SAFEBROWSING_API_KEY}"

# ── Filter Pipeline ───────────────────────────────────────────────────
# Filters applied per-protocol:
#   HTTP:  JA3 → IP → Bot → Header → DNS → Profile → Replay → Enumeration → Sandbox
#   DNS:   IP → DNS → Replay (NXDOMAIN enumeration tracked separately in listener)
#   MQTT:  IP → DNS → Replay
#   WSS:   JA3 → IP → Bot → Header → DNS → Replay

pipeline:
  filter_mode: "scoring"         # "scoring" = accumulate scores; "hard" = any block = immediate reject
  block_score_threshold: 0.7     # cumulative score above this = blocked (scoring mode only)
  enable_ip_filter: true         # IP whitelist/blacklist + GeoIP + ASN
  enable_bot_filter: true        # 40+ scanner/bot User-Agent patterns
  enable_header_filter: true     # banned keywords in header names/values
  enable_geo_filter: true        # GeoIP country/ASN blocking
  enable_dns_filter: true        # reverse DNS hostname checks
  enable_profile_filter: true    # C2 profile conformance (URI, headers, transforms)

  # Replay protection — reject duplicate requests by content hash.
  # Hashes are persisted to SQLite so replay protection survives restarts.
  enable_replay_filter: true
  replay_window_seconds: 86400   # 24h dedup window
  replay_persist: true           # persist hashes to SQLite across restarts

  # Path enumeration detection (dirbuster / ffuf / gobuster).
  # Legitimate beacons hit 1–3 unique paths; enumerators hit dozens.
  enable_enumeration_filter: true
  enumeration_unique_path_threshold: 20        # unique paths/window → BLOCK
  enumeration_unique_path_suspect_threshold: 8 # unique paths/window → SUSPECT (+score)
  enumeration_window_seconds: 60               # sliding window in seconds

  # Sandbox and headless browser detection.
  # Scores signals: HeadlessChrome UA, missing Accept-Language, Chrome without
  # sec-ch-ua, Safe Links / msnbot scanner UAs, non-browser Accept ordering.
  enable_sandbox_filter: true

  # JA3 TLS fingerprint blocking.
  # Works in two modes:
  #   1. Reverse proxy: nginx/HAProxy sets x-ja3 header → read by middleware
  #   2. Native: JA3InjectingProtocol intercepts raw ClientHello (custom server setup)
  # The built-in seed list blocks Masscan, ZGrab2, Shodan, curl, Python requests, Nmap.
  enable_ja3_filter: true
  ja3_filter:
    log_ja3: true                # log every observed JA3 hash at DEBUG level
    block_unknown: false         # if true, only allowed_ja3 hashes pass (allowlist mode)
    ja3_header: "x-ja3"         # header name set by nginx ssl_fingerprint / HAProxy
    blocked_ja3: []              # additional hashes to block (seed list always active)
    # allowed_ja3:               # allowlist mode: only these hashes pass (beacon JA3s)
    #   - "772e3e4d7940fd39d3f0898fa41e0f3b"  # Cobalt Strike default Malleable profile

# ── One-Time Payload Tokens ───────────────────────────────────────────
# Issued automatically when a beacon IP is first dynamically whitelisted.
# Token is returned in the X-Payload-Token response header and must be
# presented in X-DL-Token (or ?_t=) on subsequent payload downloads.
# Atomic SQLite UPDATE prevents any race condition on concurrent use.

payload_tokens:
  enabled: false
  default_ttl_seconds: 3600     # token expires after 1 hour
  default_max_uses: 1           # single-use by default (set higher for multi-stage)
  token_header: "X-DL-Token"   # client presents token in this request header
  token_param: "_t"             # or as a query parameter (?_t=<token>)
  issuance_header: "X-Payload-Token"  # token delivered to beacon in this response header

# ── Tracking ──────────────────────────────────────────────────────────

tracking:
  db_path: "${INFRAGUARD_DB_PATH}"       # SQLite with WAL mode
  retention_days: 30                     # auto-prune old request logs

# ── Dashboard API ─────────────────────────────────────────────────────

api:
  bind: "127.0.0.1"
  port: 8080
  auth_token: "${INFRAGUARD_API_TOKEN}"
  health_path: "/${INFRAGUARD_HEALTH_PATH}"  # change to avoid fingerprinting

# ── Logging ───────────────────────────────────────────────────────────

logging:
  level: "${INFRAGUARD_LOG_LEVEL}"       # DEBUG | INFO | WARNING | ERROR
  format: "json"                         # json | console

# ── Plugins ───────────────────────────────────────────────────────────
# Module paths to load. Plugins hook into the event pipeline and receive
# every request event (allow, block, content_served, content_blocked).

plugins:
  # SIEM integrations (batch-based, high throughput)
  # - infraguard.plugins.builtin.elasticsearch
  # - infraguard.plugins.builtin.wazuh
  # - infraguard.plugins.builtin.syslog

  # Webhook integrations (immediate, per-event alerts)
  # - infraguard.plugins.builtin.discord
  # - infraguard.plugins.builtin.slack
  # - infraguard.plugins.builtin.generic_webhook

  # Example / testing
  - infraguard.plugins.builtin.example

# ── Plugin Settings ───────────────────────────────────────────────────
# Per-plugin config keyed by plugin name. Each plugin supports:
#   enabled: bool          - set false to skip loading
#   event_filter:          - control which events are forwarded
#     only_blocked: bool   - only forward blocked requests
#     only_allowed: bool   - only forward allowed requests
#     min_score: float     - only forward events with score >= this
#     include_domains: []  - only forward events for these domains
#     exclude_domains: []  - skip events for these domains
#   options: {}            - plugin-specific key/value pairs

plugin_settings:

  # ── Elasticsearch ─────────────────────────────────────────────────
  # elasticsearch:
  #   enabled: true
  #   event_filter:
  #     min_score: 0.0                         # 0.0 = forward everything
  #   options:
  #     url: "${ELASTICSEARCH_URL}"
  #     index: "infraguard-events"
  #     api_key: "${ELASTICSEARCH_API_KEY}"
  #     # username: "elastic"
  #     # password: "${ELASTICSEARCH_PASSWORD}"
  #     batch_size: 50
  #     flush_interval: 10

  # ── Wazuh ─────────────────────────────────────────────────────────
  # wazuh:
  #   enabled: true
  #   event_filter:
  #     min_score: 0.0
  #   options:
